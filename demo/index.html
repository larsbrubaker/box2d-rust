<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box2D for Rust — Interactive Physics Demos</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <nav id="sidebar">
    <div class="sidebar-header">
      <a href="#/" class="logo-link">
        <h1 class="logo">Box2D<span class="logo-accent">.rs</span></h1>
      </a>
      <p class="tagline">Erin Catto's Samples · Rust port</p>
    </div>
    <!-- Category→sample tree, filled by main.ts from the registry. -->
    <div id="sample-tree" class="sample-tree"></div>
    <!-- Non-sample pages only — Samples tree owns every C RegisterSample route. -->
    <div class="lab-nav">
      <div class="lab-section">About</div>
      <a href="#/math" class="lab-link" data-route="math">Deterministic Math</a>
      <a href="#/roadmap" class="lab-link" data-route="roadmap">Demo Roadmap</a>
    </div>
    <div class="sidebar-footer">
      <p><a href="https://github.com/larsbrubaker/box2d-rust" target="_blank">Source on GitHub</a></p>
      <p>Rust port of <a href="https://github.com/erincatto/box2d" target="_blank">Box2D v3</a></p>
      <p class="license">MIT License</p>
    </div>
  </nav>

  <main id="main-content">
    <!-- Content dynamically injected by router -->
  </main>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
